version: '3.8'

services:
  db:
    image: postgres:14-alpine
    container_name: fss_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1203
      POSTGRES_DB: ignis_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: mqtt_broker
    restart: always
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  backend:
    build:
      context: ./back_end
      dockerfile: Dockerfile
    container_name: fss_backend
    restart: always
    environment:
      # Use the docker service name "db" for database connection
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/ignis_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=1203
      - MQTT_BROKER_URL=tcp://mqtt:1883
      # Backend will run on 8080 inside the container
      - SERVER_PORT=8080
    depends_on:
      - db
      - mqtt
    # We expose backend port if we want to hit it directly, but Nginx proxy covers it.
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./fss-dashboard
      dockerfile: Dockerfile
    container_name: fss_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
